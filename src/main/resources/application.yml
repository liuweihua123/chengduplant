spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/chengdu?useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

swagger:
  enable: true
  #配置mybatis规则
  #mybatis:
  #config-location: classpath:mybatis/mybatis-config.xml #全局配置文件位置(其实SpringBoot2也可以不需要配置mybatis-config.xml文件，直接在yaml文件中配置)
  #mapper-locations: classpath:mybatis/mapper/*.xml #sql映射文件位置
server:
  port: ${PORT:8077}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
#  configuration: #指定mybatis全局配置文件中的相关配置项
#    map-underscore-to-camel-case: true #开启驼峰命名，如果使用yaml配置那么就不能再配置config-location

#配置mybatis-plus规则
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml
