  <script type="text/javascript">

    // 初始加载6条数据，懒加载数据
    let startIndex = 0;
    let endIndex = 6;

    // 定义一个函数来加载新数据
    function loadMoreData() {
      // 显示加载中的圆圈
      $('#loading_spinner').show();

      $.ajax({
        url: BaseUrl + "/plant/getAllPlants", // 这里替换成您的服务器端接口地址
        method: 'GET',
        data: { start: startIndex, end: endIndex },
        success: function (data) {
          // 在成功回调中将新数据添加到表格中

          const tableBody = $('#table_body');
          for (let i = 0; i < data.length; i++) {
            const row = data[i];
            row.latinname == null ? row.latinname = '无' : row.latinname = row.latinname
            row.ke == null ? row.ke = '无' : row.ke = row.ke
            row.shu == null ? row.shu = '无' : row.shu = row.shu
            const newRow = `
            <tr class="spms-row" style="transform: rotate(0);" onclick="clicktr(${row.id})">
              <td class="align-middle clickable">${row.name}</td>
              <td class="align-middle clickable"><em>${row.latinname}</em> <em></em></td>
              <td class="align-middle clickable">${row.ke}</td>
              <td class="align-middle clickable">${row.shu}</td>
              <td class="align-middle clickable"><img src="${row.imgurl}" style="max-height: 32px; max-width: 32px"></td>
            </tr>
          `;
            tableBody.append(newRow);
          }

          // 更新startIndex和endIndex，准备加载更多数据
          startIndex = endIndex;
          endIndex += 6;
          // 隐藏加载中的圆圈
          $('#loading_spinner').hide();
        },
        error: function (error) {
          console.error('Failed to load data:', error);
          // 隐藏加载中的圆圈（如果发生错误时也需要隐藏）
          $('#loading_spinner').hide();
        }
      });
    }



    // 初始加载第一批数据
    loadMoreData();

    // 监听滚动事件，当滚动到底部时继续加载更多数据
    const tableDiv = document.querySelector('div[style="height: 300px; overflow-y: scroll;"]');
    tableDiv.addEventListener('scroll', function () {
      if (tableDiv.scrollTop + tableDiv.clientHeight >= tableDiv.scrollHeight) {
        loadMoreData();
      }
    });

    //点击事件
    function clicktr(id) {
      window.location.href = "spms/details2.html?id=" + id
      console.log(id)
    }

    //普通搜索
    function general_search() {
      var names = document.getElementById('zhongwenName').value
      var name = names.trim()
      if (name == '' || name == null) {
        alert('输入不能为空!')
        return;
      } else {
        window.location.href = "spms/general_list.html?name=" + name
        //window.location.href = "test.html"
        //console.log(name)
      }
    }
    //高级搜索
    function advanced_search() {
      var names = document.getElementById('taxonName').value
      var name = names.trim()

      var men = document.getElementById('men').value
      var men = men.trim()

      var gang = document.getElementById('gang').value
      var gang = gang.trim()

      var mu = document.getElementById('mu').value
      var mu = mu.trim()

      var ke = document.getElementById('ke').value
      var ke = ke.trim()

      var shu = document.getElementById('shu').value
      var shu = shu.trim()

      var zhong = document.getElementById('zhong').value
      var zhong = zhong.trim()

      if (name == '' || name == null) {
        alert('植物名称不能为空!')
        return;
      } else {
        window.location.href = "spms/advanced_list.html?name=" + name + "&men=" + men + "&gang=" + gang + "&mu=" + mu + "&ke=" + ke + "&shu=" + shu + "&zhong=" + zhong
      }
    }

    /*将总数据取出来*/
    function data() {
      //console.log("tot:"+totalCount)
      /*拿到总数据*/
      $.ajax({
        type: "GET",
