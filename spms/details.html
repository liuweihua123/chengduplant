    //获取url后面的id值
    var code = "";

      var url = location.search;
      if (url.indexOf("?") != -1) {    //是否有参数
        var str = url.substr(1);
        strs = str.split("=");
        //alert(strs[1]);   
        code = strs[1];
      }
    }
    GetRequest();
    console.log(code);

    /*将数据取出来*/

      //console.log("tot:"+totalCount)
      /*拿到总数据*/
      $.ajax({
        type: "GET",
        url: BaseUrl+"/plant/getPlantsById?id=" + id,    //s是SpringMVC中Controller中的请求地址 
        contentType: "application/json;charset=utf-8",
        success: function (data) {

          data[0].gang==null?data[0].gang='无':data[0].gang=data[0].gang
          data[0].mu==null?data[0].mu='无':data[0].mu=data[0].mu
          data[0].ke==null?data[0].ke='无':data[0].ke=data[0].ke

          data[0].zhong==null?data[0].zhong='无':data[0].zhong=data[0].zhong
          data[0].mu==null?data[0].mu='无':data[0].mu=data[0].mu
          data[0].ke==null?data[0].ke='无':data[0].ke=data[0].ke
          data[0].shu==null?data[0].shu='无':data[0].shu=data[0].shu
          data[0].zhong==null?data[0].zhong='无':data[0].zhong=data[0].zhong

          data[0].category==null?data[0].category='无':data[0].category=data[0].category
          data[0].morphology==null?data[0].morphology='无':data[0].morphology=data[0].morphology
          data[0].environment==null?data[0].environment='无':data[0].environment=data[0].environment
          data[0].patronize==null?data[0].patronize='无':data[0].patronize=data[0].patronize
          data[0].propagate==null?data[0].propagate='无':data[0].propagate=data[0].propagate

          mainObj.empty();
          mainObj.html(html.join(''));
