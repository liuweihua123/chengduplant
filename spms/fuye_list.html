  <script type="text/javascript">
    var currPage = 1;
    var totalCount;
    var dataLIst = [];
    /*将数据取出来*/
    function data(curr, limit) {
      //console.log("tot:"+totalCount)
      /*拿到总数据*/
      $.ajax({
        type: "GET",
        url: BaseUrl + "/plant/getFuyePlants?pages=" + curr,    //s是SpringMVC中Controller中的请求地址 
        contentType: "application/json;charset=utf-8",
        success: function (data) {
          /*拿到总数据*/
          totalCount = data.total; //取出来的是数据总量
          dataLIst = data.records; // 将数据放到一个数组里面（dataLIst 还未声明，莫着急）
          createTable(curr, limit, totalCount);
          console.log("tot:" + totalCount)
        },
        error: function () {
          alert("解析失败");
        }
      });
    }
    window.onload = function () {
      /*取到总条数*/
      /*每页显示多少条  10条*/
      var limit = 10;
      data(currPage, limit)
      //createTable(1, limit, totalCount);
    }

    /*创建的是一个表格，并将数据放进去*/
    function createTable(currPage, limit, total) {
      var html = [],
        showNum = limit;
      if (total - (currPage * limit) < 0) showNum = total - ((currPage - 1) * limit);
      html.push(' <div class="table-responsive"><table class="table table-hover">');
      html.push('<thead><tr>' +
        '<th style="width: 15%"><strong>中文学名</strong></th>' +
        '<th style="width: 30%"><strong>拉丁学名</strong></th>' +
        '<th style="width: 20%"><strong>科中文名</strong></th>' +
        '<th style="width: 15%"><strong>属中文名</strong></th><th style="width: 5%"></th></tr></thead><tbody id="spms_list1">');

      for (var i = 0; i < showNum; i++) {
        html.push('<tr class="spms-row" style="transform: rotate(0);" onclick="clicktr(' + dataLIst[i].id + ')">');
        html.push('<td class="align-middle clickable">' + dataLIst[i].name + '</td>');
        if (dataLIst[i].latinname == "" || dataLIst[i].latinname == null) {
          html.push('<td class="align-middle clickable">无</td>');
        } else {
          html.push('<td class="align-middle clickable">' + dataLIst[i].latinname + '</td>');
        }
        if (dataLIst[i].ke == "" || dataLIst[i].ke == null) {
          html.push('<td class="align-middle clickable">无</td>');
        } else {
          html.push('<td class="align-middle clickable">' + dataLIst[i].ke + '</td>');
        }
        if (dataLIst[i].shu == "" || dataLIst[i].shu == null) {
          html.push('<td class="align-middle clickable">无</td>');
        } else {
          html.push('<td class="align-middle clickable">' + dataLIst[i].shu + '</td>');
        }
        html.push('<td class="align-middle clickable"><img src="' + dataLIst[i].imgurl + '"style="max-height: 32px;max-width: 32px"></td>');
        html.push('</tr>');
      }
      html.push('</tbody></table></div>');
      var mainObj = $('#mainContent');
      mainObj.empty();
      mainObj.html(html.join(''));
    }
    function clicktr(id) {
      window.location.href = "details2.html?id=" + id
      console.log(id)
    }

    // Function to navigate to the next page
    function goToNextPage() {
      const totalPages = Math.ceil(totalCount / 10); // Calculate total pages
      if (currPage < totalPages) {
        currPage++;
        document.getElementById("showpages").innerHTML = "第" + currPage + "页";
        var limit = 10;
        data(currPage, limit)
        // You can perform the necessary actions to load the next page here
        console.log(`Navigating to page ${currPage}`);
      } else {
        alert("已经到达最后一页！");
      }
    }

    // Function to navigate to the previous page
    function goToPreviousPage() {
      if (currPage > 1) {
        currPage--;
        document.getElementById("showpages").innerHTML = "第" + currPage + "页";
        var limit = 10;
        data(currPage, limit)
        // You can perform the necessary actions to load the previous page here
        console.log(`Navigating to page ${currPage}`);
      } else {
        alert("已经到达第一页！");
      }
    }
    function goToFirstPage() {
      currPage = 1; // Set current page to 1
      document.getElementById("showpages").innerHTML = "第" + currPage + "页";
      var limit = 10;
      data(currPage, limit);
      // You can perform the necessary actions to load the first page here
      //console.log(`Navigating to page ${currPage}`);

    }
    function goToLastPage() {
      const totalPages = Math.ceil(totalCount / 10); // Calculate total pages
      currPage = totalPages; // Set current page to last page
      document.getElementById("showpages").innerHTML = "第" + currPage + "页";
      var limit = 10;
      data(currPage, limit);
      // You can perform the necessary actions to load the last page here
      //console.log(`Navigating to page ${currPage}`);
    }
    document.getElementById("showpages").innerHTML = "第" + currPage + "页";
    function advanced_search() {
      var names = document.getElementById('taxonName').value
      var name = names.trim()

      var men = document.getElementById('men').value
      var men = men.trim()

      var gang = document.getElementById('gang').value
      var gang = gang.trim()

      var mu = document.getElementById('mu').value
      var mu = mu.trim()

      var ke = document.getElementById('ke').value
      var ke = ke.trim()

      var shu = document.getElementById('shu').value
      var shu = shu.trim()

      var zhong = document.getElementById('zhong').value
      var zhong = zhong.trim()

      if (name == '' || name == null) {
        alert('植物名称不能为空!')
        return;
      } else {
        window.location.href = "advanced_list.html?name=" + name + "&men=" + men + "&gang=" + gang + "&mu=" + mu + "&ke=" + ke + "&shu=" + shu + "&zhong=" + zhong
      }
    }
  </script>
